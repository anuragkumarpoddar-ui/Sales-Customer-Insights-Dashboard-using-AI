<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AR Solutions – Sales & Customer Insights Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
    body {
        margin: 0;
        font-family: 'Segoe UI', sans-serif;
        background: #f4f6f9;
    }

    .header {
        background: #1f2937;
        color: white;
        padding: 15px;
        text-align: center;
        font-size: 22px;
        font-weight: bold;
    }

    .container {
        padding: 20px;
    }

    .kpi-container {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 15px;
        margin-bottom: 20px;
    }

    .kpi {
        background: white;
        padding: 20px;
        border-radius: 12px;
        box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        text-align: center;
    }

    .kpi h3 {
        margin: 0;
        font-size: 14px;
        color: gray;
    }

    .kpi p {
        font-size: 20px;
        font-weight: bold;
        margin-top: 10px;
        color: #111827;
    }

    .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
        gap: 20px;
    }

    .card {
        background: white;
        padding: 15px;
        border-radius: 12px;
        box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    canvas {
        width: 100% !important;
        height: 300px !important;
    }
</style>
</head>

<body>

<div class="header">
AR Solutions – Sales & Customer Insights Dashboard
</div>

<div class="container">

<!-- KPI SECTION -->
<div class="kpi-container">
    <div class="kpi">
        <h3>Total Revenue</h3>
        <p>₹76.9 Cr</p>
    </div>
    <div class="kpi">
        <h3>Units Sold</h3>
        <p>19,150</p>
    </div>
    <div class="kpi">
        <h3>Top City</h3>
        <p>Delhi</p>
    </div>
    <div class="kpi">
        <h3>Top Brand</h3>
        <p>Apple</p>
    </div>
    <div class="kpi">
        <h3>Payment Method</h3>
        <p>UPI</p>
    </div>
    <div class="kpi">
        <h3>Avg Rating</h3>
        <p>3.69 ⭐</p>
    </div>
</div>

<!-- CHART SECTION -->
<div class="grid">

    <div class="card">
        <h3>City-wise Sales</h3>
        <canvas id="cityChart"></canvas>
    </div>

    <div class="card">
        <h3>Brand Performance</h3>
        <canvas id="brandChart"></canvas>
    </div>

    <div class="card">
        <h3>Payment Methods</h3>
        <canvas id="paymentChart"></canvas>
    </div>

    <div class="card">
        <h3>Customer Ratings</h3>
        <canvas id="ratingChart"></canvas>
    </div>

    <div class="card">
        <h3>Sales Trend</h3>
        <canvas id="trendChart"></canvas>
    </div>

</div>

</div>

<script>

// City Chart
new Chart(document.getElementById('cityChart'), {
    type: 'bar',
    data: {
        labels: ['Delhi','Mumbai','Ranchi','Chennai','Jodhpur'],
        datasets: [{
            label: 'Units Sold',
            data: [5000,3200,2100,1900,1700]
        }]
    }
});

// Brand Chart (Donut)
new Chart(document.getElementById('brandChart'), {
    type: 'doughnut',
    data: {
        labels: ['Apple','Samsung','OnePlus','Vivo','Xiaomi'],
        datasets: [{
            data: [3932,3923,3830,3801,3664]
        }]
    }
});

// Payment Chart (Pie)
new Chart(document.getElementById('paymentChart'), {
    type: 'pie',
    data: {
        labels: ['UPI','Debit Card','Credit Card','Cash'],
        datasets: [{
            data: [40,25,20,15]
        }]
    }
});

// Ratings Chart
new Chart(document.getElementById('ratingChart'), {
    type: 'bar',
    data: {
        labels: ['1⭐','2⭐','3⭐','4⭐','5⭐'],
        datasets: [{
            label: 'Customers',
            data: [200,300,600,843,1488]
        }]
    }
});

// Trend Chart
new Chart(document.getElementById('trendChart'), {
    type: 'line',
    data: {
        labels: ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'],
        datasets: [{
            label: 'Sales',
            data: [1200,1500,1800,2000,2400,3000,2800],
            fill: false
        }]
    }
});

</script>

</body>
</html>
